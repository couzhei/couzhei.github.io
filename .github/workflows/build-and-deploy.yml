name: Build and deploy Eleventy site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEFAULT_MODEL: gpt-5-mini

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (with pnpm via Corepack)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Ensure pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@^8 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm run build # make sure this writes to ./_output (or change below)

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_output # or ./_site if that’s your Eleventy output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
