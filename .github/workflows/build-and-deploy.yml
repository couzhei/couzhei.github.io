name: Build and deploy Eleventy site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEFAULT_MODEL: gpt-5-mini

    steps:
      - uses: actions/checkout@v4

      # 1) Install pnpm explicitly
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8 # or match your local version
          run_install: false # we'll run pnpm install ourselves

      # 2) Then set up Node and enable pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm run build # ensure this outputs to ./_output or ./_site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_output # change to ./_site if that’s where Eleventy builds

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
